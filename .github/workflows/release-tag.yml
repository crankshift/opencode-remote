name: Create release tag

on:
  workflow_run:
    workflows:
      - "Check"
    types:
      - completed

permissions:
  actions: write
  contents: write

concurrency:
  group: release-tag-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  create-tag:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout checked commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create missing version tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          VERSION=$(node --input-type=module -e 'import { readFileSync } from "node:fs"; const { version } = JSON.parse(readFileSync("package.json", "utf8")); if (!/^\d+\.\d+\.\d+$/.test(version)) { throw new Error(`package.json version must be X.Y.Z, got ${version}`); } console.log(version)')
          TAG="v$VERSION"

          EXISTING_TAG_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$TAG" --jq ".object.sha" 2>/dev/null || true)
          if [ -n "$EXISTING_TAG_SHA" ]; then
            EXISTING_TAG_TYPE=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$TAG" --jq ".object.type")
            if [ "$EXISTING_TAG_TYPE" = "tag" ]; then
              EXISTING_TAG_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/$EXISTING_TAG_SHA" --jq ".object.sha")
            fi

            if [ "$EXISTING_TAG_SHA" = "$RELEASE_SHA" ]; then
              echo "Tag $TAG already exists at $RELEASE_SHA"
              exit 0
            fi

            echo "::error::Tag $TAG already exists at $EXISTING_TAG_SHA, expected $RELEASE_SHA. Bump package.json version for a new release."
            exit 1
          fi

          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/v$VERSION" \
            -f "sha=$RELEASE_SHA"

          gh workflow run publish.yml --ref "$TAG"
