name: Create release tag

on:
  workflow_run:
    workflows:
      - "Check"
    types:
      - completed

permissions:
  actions: write
  contents: write

concurrency:
  group: release-tag-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  create-tag:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout checked commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create missing version tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          VERSION=$(node --input-type=module -e 'import { readFileSync } from "node:fs"; const { version } = JSON.parse(readFileSync("package.json", "utf8")); if (!/^\d+\.\d+\.\d+$/.test(version)) { throw new Error(`package.json version must be X.Y.Z, got ${version}`); } console.log(version)')
          TAG="v$VERSION"

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 0
          fi

          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/v$VERSION" \
            -f "sha=$RELEASE_SHA"

          gh workflow run publish.yml --ref "$TAG"
